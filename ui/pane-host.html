<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'">
  <title>SquidRun Pane Host</title>
  <link rel="stylesheet" href="node_modules/@xterm/xterm/css/xterm.css">
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #0a0a0f;
    }

    #paneHostRoot {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 8px;
      padding: 8px;
      box-sizing: border-box;
    }

    .paneHostTerminal {
      width: 100%;
      height: 100%;
      min-height: 180px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 6px;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div id="paneHostRoot"></div>
  <script src="node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
  <script src="pane-host-renderer.js"></script>
</body>
</html>
